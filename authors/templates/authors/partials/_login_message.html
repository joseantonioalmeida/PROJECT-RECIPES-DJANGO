{% if user.is_authenticated %}
<div class='login-message'>
    You are logged in with 
    {{ request.user.username }}.
    <a href='{% url "authors:dashboard" %}'>See your recipes</a> or 
    {% include "authors/partials/_form_logout.html" %}
    <a class='authors-logout-link' href='#'>Click here</a> to logout.
</div>
{% else %}
<p>Sign in to your account</p>            
{% endif %}
