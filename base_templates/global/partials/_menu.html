<!-- Sidebar Off-Canvas -->
<div class="menu-sidebar menu-hidden">
    <!-- Overlay/Backdrop -->
    <div class="menu-overlay"></div>

    <!-- Sidebar Container -->
    <div class="menu-content">
        <!-- Close Button -->
        <button class="button-close-menu" aria-label="Fechar menu">
            <i class="fas fa-times"></i>
            <span class="hidden-text">Fechar Menu</span>
        </button>

        <!-- Navigation -->
        <nav class="menu-nav">
            <!-- Home -->
            <a href="{% url 'recipes:home' %}" class="menu-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>

            {% if user.is_authenticated %}
            <!-- New Recipe -->
            <a href="{% url 'authors:dashboard_recipe_new' %}" class="menu-link">
                <i class="fas fa-plus-circle"></i>
                <span>Nova Receita</span>
            </a>

            <!-- Dashboard -->
            <a href="{% url 'authors:dashboard' %}" class="menu-link">
                <i class="fas fa-chart-bar"></i>
                <span>Dashboard</span>
            </a>

            <!-- Logout -->
            <form action="{% url 'authors:logout' %}" method="POST" class="menu-logout-form">
                {% csrf_token %}
                <button type="submit" class="menu-link menu-link-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </form>
            {% else %}
            <!-- Login -->
            <a href="{% url 'authors:login' %}" class="menu-link">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login</span>
            </a>

            <!-- Register -->
            <a href="{% url 'authors:register' %}" class="menu-link">
                <i class="fas fa-user-plus"></i>
                <span>Registrar</span>
            </a>
            {% endif %}
        </nav>
    </div>
</div>
